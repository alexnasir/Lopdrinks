services:
  - type: web
    name: lopdrinks-api
    runtime: python
    region: oregon
    plan: free

    # The Flask backend lives inside Lopdrinks-main/server/
    rootDir: Lopdrinks-main/server

    buildCommand: pip install -r requirements-prod.txt

    startCommand: gunicorn "run:app" --workers 2 --threads 2 --timeout 120 --bind 0.0.0.0:$PORT

    # Run DB migrations automatically before each deploy
    preDeployCommand: flask --app run:app db upgrade

    healthCheckPath: /health

    envVars:
      - key: APP_ENV
        value: production
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: lopdrinks-db
          property: connectionString
      - key: ALLOWED_ORIGINS
        value: "https://lopdrinks-blwa.vercel.app"

databases:
  - name: lopdrinks-db
    databaseName: lopdrinks
    user: lopdrinks
    region: oregon
    plan: free
