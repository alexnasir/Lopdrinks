services:
  - type: web
    name: lopdrinks-api
    runtime: python
    region: oregon
    plan: free

    # The Flask backend lives inside Lopdrinks-main/server/
    rootDir: Lopdrinks-main/server

    buildCommand: pip install -r requirements-prod.txt

    # Migrations run before gunicorn starts (preDeployCommand is paid-tier only)
    # stamp --purge marks existing tables as already migrated, then upgrade
    # applies any new migrations safely. Idempotent on every restart.
    startCommand: bash start.sh

    healthCheckPath: /health

    envVars:
      - key: APP_ENV
        value: production
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: lopdrinks-db
          property: connectionString
      - key: ALLOWED_ORIGINS
        value: "https://lopdrinks-blwa.vercel.app,https://main-ecru-eight.vercel.app,https://lopdrinks-blwa-5ky8hytoj-alexs-projects-7f85cd3e.vercel.app"

databases:
  - name: lopdrinks-db
    databaseName: lopdrinks
    user: lopdrinks
    region: oregon
    plan: free
